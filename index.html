<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eco‑Friendly Material Library</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111111;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  overflow:hidden;
}

#app{
  width:100%;
  height:100%;
  position:relative;
}

/* HEADER */
.header{
  position:absolute;
  top:22px;
  width:100%;
  text-align:center;
  font-size:20px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:500;
}

.home{
  width:100%;
  height:100%;
  position:relative;
}

.material{
  position:absolute;
  border:0;
  background:transparent;
  cursor:pointer;
  padding:0;

  transition:transform .25s ease,filter .25s ease;

  /* FASTER FLOAT */
  animation:
    driftX var(--dx,6s) ease-in-out infinite alternate,
    driftY var(--dy,8s) ease-in-out infinite alternate;
}

.material:hover{
  transform:scale(1.25);
  filter:drop-shadow(0 20px 35px rgba(0,0,0,.15));
  z-index:5;
}

.material img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
}

.label{
  position:absolute;
  left:50%;
  bottom:-32px;
  transform:translateX(-50%) translateY(6px);
  opacity:0;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  transition:all .2s ease;
}

.material:hover .label{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* DETAIL PAGE */
.page{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  overflow:auto;
}

.page img{
  width:180px;
  margin-bottom:20px;
}

.title{
  font-size:28px;
  margin-bottom:12px;
}

.description{
  max-width:650px;
  font-size:18px;
  line-height:1.6;
}

.impact{
  margin-top:20px;
  font-size:16px;
  color:#333;
}

.creatorLink{
  margin-top:60px;
  font-size:15px;
  cursor:pointer;
  text-decoration:underline;
}

.creator img{
  width:200px;
  border-radius:8px;
  margin-bottom:20px;
}

.creator p{
  max-width:700px;
  font-size:18px;
  line-height:1.6;
}

/* FLOAT ANIMATIONS */
@keyframes driftX{
from{transform:translateX(-12px)}
to{transform:translateX(12px)}
}

@keyframes driftY{
from{translate:0 -14px}
to{translate:0 14px}
}

</style>
</head>

<body>
<div id="app"></div>

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

<script>

const materials=[
{
name:"Cork",
image:"./cork.png",
slug:"cork",
description:"Cork is harvested from the bark of cork oak trees without cutting the tree down. Because the bark regenerates, the same tree can be harvested many times over its lifetime. Cork is lightweight, naturally insulating, and widely used in flooring and acoustic materials.",
impact:"Compared to vinyl flooring, cork has dramatically lower embodied carbon and is renewable because the tree continues growing after harvest."
},
{
name:"Cob",
image:"./cob.png",
slug:"cob",
description:"Cob is a traditional building material made from earth, sand, straw, and water. It can be sculpted into walls by hand and has been used for centuries around the world.",
impact:"Compared to concrete, cob has almost zero industrial processing and therefore far lower carbon emissions."
},
{
name:"Timber",
image:"./timber.png",
slug:"timber",
description:"Timber stores carbon absorbed during a tree's growth. Modern mass‑timber systems allow wood to replace more carbon‑intensive materials in structural buildings.",
impact:"Compared to steel framing, sustainably sourced timber can significantly reduce embodied carbon in buildings."
},
{
name:"Kraft Paper",
image:"./kraft-paper.png",
slug:"kraft",
description:"Kraft paper is a strong paper product made from wood pulp. It is recyclable, biodegradable, and widely used for packaging and protective wrapping.",
impact:"Compared to plastic packaging, kraft paper decomposes naturally and can be recycled many times."
},
{
name:"Bamboo",
image:"./bamboo.png",
slug:"bamboo",
description:"Bamboo is one of the fastest growing plants on Earth and can be harvested every few years. It is increasingly used in flooring, furniture, and structural systems.",
impact:"Compared to traditional hardwoods, bamboo regrows much faster and can be harvested far more frequently with less ecological impact."
}
]

const app=document.getElementById("app")

function random(min,max){return Math.random()*(max-min)+min}

function goHome(){history.pushState({},"","/");render()}

function openCreator(){history.pushState({},"","/creator");render()}

function openMaterial(mat){history.pushState({},"","/"+mat.slug);render()}

function renderHome(){

app.innerHTML=""

const header=document.createElement("div")
header.className="header"
header.textContent="Eco‑Friendly Material Library"

const home=document.createElement("div")
home.className="home"

const placed=[]

materials.forEach(m=>{

const size=random(190,240)
let x,y
let safe=false

while(!safe){

x=random(80,window.innerWidth-size-80)
y=random(120,window.innerHeight-size-80)

safe=true

for(const p of placed){

const dx=x-p.x
const dy=y-p.y
const dist=Math.sqrt(dx*dx+dy*dy)

if(dist<260){safe=false;break}
}
}

placed.push({x,y})

const btn=document.createElement("button")
btn.className="material"

btn.style.left=x+"px"
btn.style.top=y+"px"
btn.style.width=size+"px"
btn.style.height=size+"px"

btn.style.setProperty("--dx",random(5,7)+"s")
btn.style.setProperty("--dy",random(6,8)+"s")

btn.onclick=()=>openMaterial(m)

const img=document.createElement("img")
img.src=m.image

const label=document.createElement("div")
label.className="label"
label.textContent=m.name

btn.appendChild(img)
btn.appendChild(label)

home.appendChild(btn)

})

app.appendChild(header)
app.appendChild(home)
}

function renderMaterial(mat){

app.innerHTML=`

<div class="page">

<img src="${mat.image}">

<div class="title">${mat.name}</div>

<div class="description">${mat.description}</div>

<div class="impact"><strong>Climate Impact:</strong> ${mat.impact}</div>

<div class="creatorLink" onclick="openCreator()">Meet the Creator!</div>

</div>

`
}

function renderCreator(){

app.innerHTML=`

<div class="page creator">

<img src="./Dillon.jpg">

<p>
Hey! I'm Dillon, an undergraduate student studying Theatre Design & Technology with a growing focus on sustainable architecture and lighting design. I believe creativity shouldn't just shape experiences on stage — it should also help shape a better world.
<br><br>
My background in theatrical lighting taught me how powerful light and space can be in shaping human experience. As my interests evolved toward architecture, I became especially passionate about how energy‑efficient lighting and sustainable materials can transform buildings into tools for climate responsibility.
<br><br>
Looking ahead, I hope to bridge the worlds of lighting and architecture to design spaces where sustainability, beauty, and human well‑being work together. Next fall I'll be heading to graduate school to pursue a Master of Science in Architecture with a focus on sustainability.
<br><br>
Stay tuned — this is just the beginning of the project.
</p>

<div class="creatorLink" onclick="goHome()">Back to Library</div>

</div>

`
}

function render(){

const path=window.location.pathname

if(path==="/creator"){
renderCreator()
return
}

const mat=materials.find(m=>"/"+m.slug===path)

if(mat){renderMaterial(mat)}
else{renderHome()}

}

window.onpopstate=render

render()

</script>

</body>
</html>
