<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eco-Friendly Material Library</title>
<style>
:root{
  --bg:#ffffff;
  --text:#111111;
  --muted:#6f6f6f;
  --line:#e9e9e9;
  --shadow:0 12px 30px rgba(17,17,17,.08);
  --shadow-hover:0 20px 40px rgba(17,17,17,.12);
  --pastel-blue:#edf4ff;
  --pastel-green:#eef8f0;
  --pastel-peach:#fff2e8;
  --pastel-lavender:#f4eeff;
  --pastel-yellow:#fff9e8;
  --pastel-pink:#fff0f5;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
}
body{animation:fadeIn .7s ease}
a{color:inherit}
button,input{font:inherit}
#app{min-height:100vh}
.fade-layer{min-height:100vh;animation:pageFade .35s ease}
.header{
  padding:28px 24px 0;
  text-align:center;
}
.header h1{
  margin:0;
  font-size:22px;
  font-weight:500;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.header p{
  margin:12px 0 0;
  color:var(--muted);
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  line-height:1.7;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:20px 24px 0;
}
.backLink,.creatorLink,.ghostBtn{
  background:none;
  border:0;
  padding:0;
  text-decoration:underline;
  cursor:pointer;
  color:var(--text);
}
.searchWrap{
  width:min(680px, calc(100vw - 40px));
  margin:22px auto 0;
}
.searchBar{
  width:100%;
  height:50px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  padding:0 18px;
  outline:none;
  box-shadow:0 4px 18px rgba(17,17,17,.04);
}
.searchBar:focus{border-color:#d7d7d7}
.searchResults{
  width:min(680px, calc(100vw - 40px));
  margin:14px auto 0;
  display:grid;
  gap:10px;
}
.searchResultCard{
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px 16px;
  background:#fff;
  box-shadow:0 6px 18px rgba(17,17,17,.04);
}
.searchResultTop{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.searchResultName{font-weight:600}
.searchResultDesc{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.5}
.tagRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tag{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  background:#f7f7f7;
  border:1px solid #efefef;
  font-size:12px;
  color:#444;
}
.homeCanvas{
  position:relative;
  height:clamp(520px, 62vh, 760px);
  margin:12px 0 0;
  overflow:hidden;
}
.categoryBubble{
  position:absolute;
  left:0;
  top:0;
  width:220px;
  height:220px;
  border-radius:999px;
  border:1px solid rgba(17,17,17,.08);
  background:var(--bubble, var(--pastel-blue));
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  cursor:pointer;
  transition:transform .22s ease, box-shadow .22s ease, filter .22s ease;
  will-change:transform;
}
.categoryBubble:hover{
  box-shadow:var(--shadow-hover);
  filter:brightness(1.01);
}
.categoryTitle{
  font-size:18px;
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.categorySubtitle{
  margin-top:8px;
  font-size:13px;
  line-height:1.5;
  color:#555;
}
.bottomCta{
  text-align:center;
  padding:10px 20px 28px;
}
.pageShell{min-height:100vh;padding:20px 24px 40px}
.gridHeader{
  margin:12px auto 0;
  width:min(1120px, 100%);
}
.gridHeader h2{margin:0;font-size:30px;font-weight:600}
.gridHeader p{margin:10px 0 0;color:var(--muted);line-height:1.6;max-width:760px}
.filterBar{
  width:min(1120px,100%);
  margin:18px auto 0;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.filterChip{
  border:1px solid var(--line);
  background:#fff;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
}
.filterChip.active{background:#111;color:#fff;border-color:#111}
.materialGrid{
  width:min(1120px,100%);
  margin:18px auto 0;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px,1fr));
  gap:18px;
}
.card{
  border:1px solid var(--line);
  border-radius:22px;
  background:#fff;
  padding:18px;
  box-shadow:0 8px 22px rgba(17,17,17,.04);
  transition:transform .18s ease, box-shadow .18s ease;
  cursor:pointer;
}
.card:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(17,17,17,.08)}
.cardTitle{font-size:18px;font-weight:600;line-height:1.35}
.cardDesc{margin-top:10px;color:var(--muted);line-height:1.55;font-size:14px}
.detail{
  min-height:100vh;
  padding:24px;
}
.detailInner{
  width:min(940px,100%);
  margin:0 auto;
}
.detailTop{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:28px;
  align-items:start;
  margin-top:20px;
}
.detailImageWrap{
  border:1px solid var(--line);
  border-radius:28px;
  background:#fff;
  min-height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
}
.detailImageWrap img{max-width:100%;max-height:180px;object-fit:contain}
.detailTitle{font-size:34px;font-weight:650;line-height:1.15}
.detailText{margin-top:18px;line-height:1.8;font-size:17px;color:#202020}
.impactBox{
  margin-top:22px;
  background:linear-gradient(180deg, #faf8ff 0%, #f5f7ff 100%);
  border:1px solid #ecebff;
  border-radius:24px;
  padding:20px;
}
.impactBox h3{margin:0 0 10px;font-size:14px;letter-spacing:.08em;text-transform:uppercase}
.impactBox p{margin:0;line-height:1.7}
.creatorPage{
  min-height:100vh;
  padding:24px;
}
.creatorInner{
  width:min(820px,100%);
  margin:0 auto;
  text-align:center;
}
.creatorPhoto{
  width:220px;
  height:220px;
  margin:24px auto 0;
  border-radius:24px;
  overflow:hidden;
  border:1px solid var(--line);
  background:#fafafa;
}
.creatorPhoto img{width:100%;height:100%;object-fit:cover}
.creatorBody{margin-top:24px;line-height:1.85;font-size:17px}
.socialCard{
  display:block;
  text-align:left;
  text-decoration:none;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px 16px;
  background:#fff;
  box-shadow:0 6px 18px rgba(17,17,17,.04);
  transition:transform .18s ease, box-shadow .18s ease;
}
.socialCard:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(17,17,17,.08);
}
.socialLabel{
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
}
.socialTitle{
  margin-top:4px;
  font-size:16px;
  font-weight:600;
  color:var(--text);
}
.socialSub{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
}
.creatorMeta{margin-top:22px;display:grid;gap:8px}
.emptyState{
  width:min(1120px,100%);
  margin:20px auto 0;
  border:1px dashed #ddd;
  border-radius:22px;
  padding:24px;
  text-align:center;
  color:var(--muted);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media (max-width: 800px){
  .header h1{font-size:18px;letter-spacing:.12em}
  .header p{font-size:11px}
  .searchWrap,.searchResults{width:min(680px, calc(100vw - 28px))}
  .homeCanvas{height:520px}
  .categoryBubble{width:150px;height:150px;padding:16px}
  .categoryTitle{font-size:14px}
  .categorySubtitle{font-size:11px}
  .detailTop{grid-template-columns:1fr;gap:20px}
  .detailTitle{font-size:28px}
  .detailText{font-size:16px}
  .gridHeader h2{font-size:24px}
}
</style>
</head>

<div id="app"></div>
<script>
const materials = [
  { name: "Cross-Laminated Timber (CLT)", slug: "cross-laminated-timber-clt", image: "./cross-laminated-timber-clt.png", short: "Engineered timber panels for walls, floors, and roofs.", description: "Cross-Laminated Timber (CLT) is an engineered wood product composed of multiple layers of dimensional lumber stacked perpendicular to one another and bonded with structural adhesives. This cross-laminated configuration provides exceptional strength, rigidity, and dimensional stability, allowing CLT panels to be used for floors, walls, and roofs in mid- to high-rise construction. Panels are typically prefabricated off-site with CNC precision, reducing construction time, labor, and material waste. CLT can also be left exposed, creating a warm, natural interior aesthetic while eliminating additional finish layers.", climateImpact: "Acts as a carbon sink by storing carbon absorbed during tree growth and has significantly lower embodied carbon than steel and concrete when sustainably sourced.", tags: ["Structural", "Bio-Based", "Low Carbon"] },
  { name: "Hempcrete", slug: "hempcrete", image: "./hempcrete.png", short: "Bio-composite wall infill with thermal and acoustic performance.", description: "Hempcrete is a bio-composite material made from the woody core of the hemp plant combined with a lime-based binder and water. It is typically used as a non-load-bearing wall infill within a structural frame. Hempcrete is lightweight, breathable, and highly effective at regulating moisture, which helps prevent mold and improves indoor air quality. It also provides strong thermal and acoustic insulation, contributing to passive environmental control in buildings.", climateImpact: "Hemp absorbs significant CO₂ during growth, and the lime binder continues to sequester carbon over time, making hempcrete a carbon-negative material.", tags: ["Insulation", "Bio-Based", "Low Carbon"] },
  { name: "Rammed Earth", slug: "rammed-earth", image: "./rammed-earth.png", short: "Compacted earth walls with strong thermal mass.", description: "Rammed earth is a traditional construction method that involves compacting layers of soil, sand, and aggregate into formwork to create dense, monolithic walls. These walls offer high thermal mass, absorbing heat during the day and releasing it slowly at night to regulate indoor temperatures. Rammed earth structures are durable, fire-resistant, and often left exposed, serving as both structure and finish with a distinctive layered texture.", climateImpact: "Extremely low embodied energy due to minimal processing and potential for local sourcing. Reduces operational energy through thermal mass.", tags: ["Structural", "Envelope", "Low Carbon"] },
  { name: "Low-Carbon Concrete (LC3 / Blended Cement)", slug: "low-carbon-concrete-lc3-blended-cement", image: "./low-carbon-concrete-lc3-blended-cement.png", short: "Lower-emission concrete for common structural uses.", description: "Low-carbon concrete incorporates alternative materials such as fly ash, slag, or calcined clay to partially replace traditional Portland cement. These mixes maintain structural performance while reducing environmental impact. It can be used in foundations, slabs, and structural systems without changing construction practices.", climateImpact: "Reduces CO₂ emissions by up to 50% compared to conventional concrete.", tags: ["Structural", "Low Carbon"] },
  { name: "Bamboo", slug: "bamboo", image: "./bamboo.png", short: "Fast-growing grass used structurally and as a finish.", description: "Bamboo is a fast-growing grass used in both structural and finish applications. It can be used in its natural form or engineered into panels, beams, and flooring. Bamboo has a high strength-to-weight ratio and flexibility, making it suitable for a range of architectural uses. Its natural aesthetic also makes it popular for interior applications.", climateImpact: "Rapidly renewable and highly efficient at carbon sequestration, growing to maturity in just a few years.", tags: ["Structural", "Finishes", "Bio-Based"] },
  { name: "Cork", slug: "cork", image: "./cork.png", short: "Lightweight bark material for insulation and finishes.", description: "Cork is harvested from the bark of cork oak trees without harming the tree, allowing it to regenerate. It is used in flooring, wall panels, and insulation. Cork is lightweight, elastic, and provides excellent thermal and acoustic insulation while also being resistant to moisture and pests.", climateImpact: "Renewable and carbon-storing; harvesting promotes increased carbon absorption in trees.", tags: ["Insulation", "Finishes", "Bio-Based"] },
  { name: "Cellulose Insulation", slug: "cellulose-insulation", image: "./cellulose-insulation.png", short: "Blown-in recycled paper insulation for retrofits and cavities.", description: "Cellulose insulation is made primarily from recycled paper products such as newspapers. It is typically installed as a blown-in material that fills gaps and cavities, creating an effective air barrier. It is particularly useful in retrofits due to its ability to conform to irregular spaces.", climateImpact: "Low embodied energy and diverts significant waste from landfills.", tags: ["Insulation", "Reclaimed/Recycled", "Low Carbon"] },
  { name: "High-Performance Glass (Double/Triple Glazing)", slug: "high-performance-glass-double-triple-glazing", image: "./high-performance-glass-double-triple-glazing.png", short: "High-efficiency glazing for daylight and thermal control.", description: "High-performance glazing systems consist of multiple layers of glass separated by air or gas-filled cavities, often with low-emissivity coatings. These systems improve insulation while allowing natural daylight, balancing energy efficiency with occupant comfort.", climateImpact: "Reduces heating and cooling demands, significantly lowering operational energy use.", tags: ["Envelope", "Low Carbon"] },
  { name: "Recycled Steel", slug: "recycled-steel", image: "./recycled-steel.png", short: "Durable structural metal with recycled content.", description: "Steel can be recycled repeatedly without losing its strength or durability. Recycled steel is used in structural systems, reinforcement, and architectural components. It remains one of the most durable and versatile construction materials.", climateImpact: "Reduces need for virgin extraction and lowers energy use, though still energy-intensive overall.", tags: ["Structural", "Reclaimed/Recycled"] },
  { name: "Reclaimed Wood", slug: "reclaimed-wood", image: "./reclaimed-wood.png", short: "Salvaged wood reused for interiors and construction.", description: "Reclaimed wood is salvaged from existing structures and reused in new construction or interior applications. It often has unique textures and character, making it desirable for finishes while also reducing demand for new timber.", climateImpact: "Extends carbon storage lifecycle and reduces deforestation.", tags: ["Finishes", "Reclaimed/Recycled", "Bio-Based"] },
  { name: "Mycelium Panels", slug: "mycelium-panels", image: "./mycelium-panels.png", short: "Fungal-grown panels formed from organic waste.", description: "Mycelium materials are grown from fungal networks that bind organic waste into lightweight, rigid forms. They can be molded into panels or blocks and are increasingly explored in sustainable design.", climateImpact: "Low energy production and biodegradable; potentially carbon-negative.", tags: ["Insulation", "Bio-Based", "Low Carbon"] },
  { name: "Straw Bale", slug: "straw-bale", image: "./straw-bale.png", short: "Highly insulating wall system made from agricultural byproduct.", description: "Straw bale construction uses compressed agricultural byproducts to form thick, highly insulating walls. These systems are often finished with plaster and can be used in both load-bearing and infill applications.", climateImpact: "Utilizes agricultural waste and has very low embodied carbon.", tags: ["Insulation", "Bio-Based", "Low Carbon"] },
  { name: "Glulam (Glue-Laminated Timber)", slug: "glulam-glue-laminated-timber", image: "./glulam-glue-laminated-timber.png", short: "Large engineered timber members for spans and expressive forms.", description: "Glulam is made by bonding layers of timber into large structural members. It can be manufactured in curved or straight forms, enabling long spans and expressive architectural designs.", climateImpact: "Stores carbon and efficiently uses smaller pieces of wood.", tags: ["Structural", "Bio-Based", "Low Carbon"] },
  { name: "Adobe", slug: "adobe", image: "./adobe.png", short: "Sun-dried earth bricks with high thermal mass.", description: "Adobe is made from clay, sand, water, and organic fibers, formed into bricks and dried naturally. It provides excellent thermal mass and has been used in construction for centuries.", climateImpact: "Extremely low embodied energy and often locally sourced.", tags: ["Structural", "Envelope", "Low Carbon"] },
  { name: "Fly Ash Concrete", slug: "fly-ash-concrete", image: "./fly-ash-concrete.png", short: "Concrete mix using industrial byproduct in place of cement.", description: "Fly ash concrete replaces a portion of cement with industrial byproducts, improving durability and reducing environmental impact.", climateImpact: "Reduces emissions and repurposes waste.", tags: ["Structural", "Reclaimed/Recycled", "Low Carbon"] },
  { name: "Aerogel Insulation", slug: "aerogel-insulation", image: "./aerogel-insulation.png", short: "Ultra-light high-performance insulation for tight assemblies.", description: "Aerogel is an ultra-lightweight, highly porous material with exceptional insulating properties. It is used in high-performance applications where space is limited.", climateImpact: "Reduces operational energy significantly, though production is energy-intensive.", tags: ["Insulation", "Low Carbon"] },
  { name: "Timber Cladding", slug: "timber-cladding", image: "./timber-cladding.png", short: "Exterior wood skin for protection and warmth.", description: "Timber cladding is used on building exteriors for protection and aesthetics. It can weather naturally or be treated for durability.", climateImpact: "Renewable and lower carbon than metal cladding.", tags: ["Envelope", "Bio-Based"] },
  { name: "Terracotta Panels", slug: "terracotta-panels", image: "./terracotta-panels.png", short: "Fired clay façade panels for ventilated envelope systems.", description: "Terracotta panels are fired clay elements used in ventilated façade systems, offering durability and breathability.", climateImpact: "Long lifespan offsets initial energy used in firing.", tags: ["Envelope", "Low Carbon"] },
  { name: "Sheep Wool Insulation", slug: "sheep-wool-insulation", image: "./sheep-wool-insulation.png", short: "Natural wool insulation with moisture regulation.", description: "Natural insulation made from wool fibers that regulate moisture and provide thermal performance.", climateImpact: "Renewable, biodegradable, and low embodied energy.", tags: ["Insulation", "Bio-Based"] },
  { name: "Mineral Wool", slug: "mineral-wool", image: "./mineral-wool.png", short: "Durable fire-resistant insulation made from rock or slag.", description: "Insulation made from spun rock or slag, offering fire resistance and durability.", climateImpact: "Often includes recycled content and has long service life.", tags: ["Insulation", "Reclaimed/Recycled"] },
  { name: "Recycled Brick", slug: "recycled-brick", image: "./recycled-brick.png", short: "Salvaged brick reused in new envelope construction.", description: "Salvaged brick reused in new construction, preserving material character and reducing waste.", climateImpact: "Avoids emissions from new brick production.", tags: ["Envelope", "Reclaimed/Recycled"] },
  { name: "Engineered Wood (LVL)", slug: "engineered-wood-lvl", image: "./engineered-wood-lvl.png", short: "Structural laminated veneer lumber for framing systems.", description: "Laminated veneer lumber made from bonded wood layers for structural applications.", climateImpact: "Efficient use of timber resources.", tags: ["Structural", "Bio-Based"] },
  { name: "Glass Fiber Reinforced Concrete (GFRC)", slug: "glass-fiber-reinforced-concrete-gfrc", image: "./glass-fiber-reinforced-concrete-gfrc.png", short: "Lightweight façade concrete reinforced with glass fibers.", description: "Lightweight concrete panels reinforced with glass fibers for façades.", climateImpact: "Uses less material than traditional concrete.", tags: ["Envelope", "Low Carbon"] },
  { name: "Green Wall Systems", slug: "green-wall-systems", image: "./green-wall-systems.png", short: "Vegetated wall assemblies for façades and interiors.", description: "Vegetated wall systems integrated into building façades for environmental and aesthetic benefits.", climateImpact: "Improves air quality and reduces heat gain.", tags: ["Envelope", "Bio-Based"] },
  { name: "Locally Sourced Stone", slug: "locally-sourced-stone", image: "./locally-sourced-stone.png", short: "Natural stone with reduced transport impact.", description: "Natural stone used in construction, often sourced nearby to reduce transport.", climateImpact: "Low processing energy and long lifespan.", tags: ["Structural", "Envelope", "Low Carbon"] },
  { name: "Clay Plaster", slug: "clay-plaster", image: "./clay-plaster.png", short: "Breathable natural finish for interior surfaces.", description: "Natural interior finish made from clay and sand, offering breathable surfaces.", climateImpact: "Low embodied energy and non-toxic.", tags: ["Finishes", "Bio-Based"] },
  { name: "Low-VOC Paint", slug: "low-voc-paint", image: "./low-voc-paint.png", short: "Paint with reduced harmful emissions.", description: "Paint formulated to reduce harmful emissions and improve indoor air quality.", climateImpact: "Reduces indoor pollutants.", tags: ["Finishes", "Low Carbon"] },
  { name: "Recycled Plastic Panels", slug: "recycled-plastic-panels", image: "./recycled-plastic-panels.png", short: "Panels made from post-consumer plastic waste.", description: "Panels made from post-consumer plastic waste used in interiors and façades.", climateImpact: "Diverts plastic waste from landfills.", tags: ["Envelope", "Reclaimed/Recycled"] },
  { name: "Hemp Fiber Panels", slug: "hemp-fiber-panels", image: "./hemp-fiber-panels.png", short: "Compressed hemp-fiber panels for walls and insulation.", description: "Panels made from compressed hemp fibers used in walls and insulation.", climateImpact: "Renewable and low carbon.", tags: ["Insulation", "Bio-Based"] },
  { name: "EPS (Expanded Polystyrene)", slug: "eps-expanded-polystyrene", image: "./eps-expanded-polystyrene.png", short: "Lightweight foam insulation used in building assemblies.", description: "Lightweight foam insulation used in construction.", climateImpact: "Reduces energy use but has environmental concerns.", tags: ["Insulation"] },
  { name: "XPS (Extruded Polystyrene)", slug: "xps-extruded-polystyrene", image: "./xps-extruded-polystyrene.png", short: "Rigid moisture-resistant foam insulation.", description: "Rigid foam insulation with high strength and moisture resistance.", climateImpact: "Higher environmental impact than alternatives.", tags: ["Insulation"] },
  { name: "Linoleum", slug: "linoleum", image: "./linoleum.png", short: "Natural flooring made from linseed oil and cork dust.", description: "Natural flooring made from linseed oil and cork dust.", climateImpact: "Renewable and biodegradable.", tags: ["Finishes", "Bio-Based"] },
  { name: "FSC-Certified Timber", slug: "fsc-certified-timber", image: "./fsc-certified-timber.png", short: "Responsibly sourced timber from certified forests.", description: "Wood sourced from responsibly managed forests with certification standards.", climateImpact: "Supports sustainable forestry and carbon storage.", tags: ["Structural", "Bio-Based"] },
  { name: "Permeable Pavers", slug: "permeable-pavers", image: "./permeable-pavers.png", short: "Paving systems that allow water infiltration.", description: "Paving systems that allow water infiltration.", climateImpact: "Reduces runoff and flooding.", tags: ["Envelope", "Low Carbon"] },
  { name: "ETFE", slug: "etfe", image: "./etfe.png", short: "Lightweight membrane used for roofs and façades.", description: "Lightweight plastic membrane used for roofs and façades.", climateImpact: "Uses less material than glass systems.", tags: ["Envelope"] },
  { name: "Zinc Cladding", slug: "zinc-cladding", image: "./zinc-cladding.png", short: "Durable recyclable metal façade with protective patina.", description: "Durable metal façade that develops a protective patina.", climateImpact: "Long lifespan and recyclable.", tags: ["Envelope", "Reclaimed/Recycled"] },
  { name: "Recycled Aluminum", slug: "recycled-aluminum", image: "./recycled-aluminum.png", short: "Lightweight metal for façades and systems using recycled content.", description: "Lightweight metal used in façades and building systems.", climateImpact: "Recycling uses significantly less energy.", tags: ["Envelope", "Reclaimed/Recycled"] },
  { name: "Bio-Resin Panels", slug: "bio-resin-panels", image: "./bio-resin-panels.png", short: "Panels made from plant-based resin systems.", description: "Panels made from plant-based resins as alternatives to plastics.", climateImpact: "Reduces reliance on fossil fuels.", tags: ["Finishes", "Bio-Based"] },
  { name: "Paper Composite Panels", slug: "paper-composite-panels", image: "./paper-composite-panels.png", short: "Composite panels made from recycled paper and resin.", description: "Panels made from recycled paper and resin.", climateImpact: "Reduces virgin material use.", tags: ["Finishes", "Reclaimed/Recycled"] },
  { name: "Gypsum Board (Recycled)", slug: "gypsum-board-recycled", image: "./gypsum-board-recycled.png", short: "Drywall with recycled gypsum content.", description: "Drywall panels incorporating recycled gypsum content.", climateImpact: "Reduces mining and waste.", tags: ["Finishes", "Reclaimed/Recycled"] },
  { name: "Straw Panels", slug: "straw-panels", image: "./straw-panels.png", short: "Compressed straw panels for construction assemblies.", description: "Panels made from compressed straw fibers used in construction.", climateImpact: "Utilizes agricultural waste.", tags: ["Insulation", "Bio-Based"] },
  { name: "Recycled Glass Tiles", slug: "recycled-glass-tiles", image: "./recycled-glass-tiles.png", short: "Finish tiles made from recycled glass.", description: "Tiles made from recycled glass used for finishes.", climateImpact: "Diverts waste and reduces raw material demand.", tags: ["Finishes", "Reclaimed/Recycled"] },

const categories = [
  { name: "Structural", slug: "structural", subtitle: "Load-bearing systems and framing materials.", color: "var(--pastel-blue)" },
  { name: "Envelope", slug: "envelope", subtitle: "Exterior skins, façades, and weather barriers.", color: "var(--pastel-peach)" },
  { name: "Insulation", slug: "insulation", subtitle: "Materials for thermal and acoustic performance.", color: "var(--pastel-green)" },
  { name: "Finishes", slug: "finishes", subtitle: "Surface materials, coatings, and interior applications.", color: "var(--pastel-lavender)" },
  { name: "Bio-Based", slug: "bio-based", subtitle: "Materials derived from renewable biological sources.", color: "var(--pastel-yellow)" },
  { name: "Reclaimed/Recycled", slug: "reclaimed-recycled", subtitle: "Materials reused or made with recycled content.", color: "var(--pastel-pink)" }
];

const tagFilters = ["Bio-Based", "Reclaimed/Recycled", "Low Carbon"];
const app = document.getElementById('app');
let bubbleItems = [];
let rafId = null;
let lastTime = 0;
let homeSearch = '';
let activeCategoryFilter = 'All';

function fadeRender(cb){
  stopBubbles();
  app.innerHTML = '<div class="fade-layer"></div>';
  cb(app.firstElementChild);
}
function slugifyValue(v){return v.toLowerCase()}
function categoryPath(cat){return '/category/' + cat.slug}
function materialPath(mat){return '/material/' + mat.slug}
function goHome(){history.pushState({},'', '/'); render()}
function goCreator(){history.pushState({},'', '/creator'); render()}
function openCategory(cat){history.pushState({},'', categoryPath(cat)); activeCategoryFilter='All'; render()}
function openMaterial(mat){history.pushState({},'', materialPath(mat)); render()}
function findCategoryByPath(path){return categories.find(c => categoryPath(c) === path)}
function findMaterialByPath(path){return materials.find(m => materialPath(m) === path)}
function matchesSearch(material, query){
  const q = query.trim().toLowerCase();
  if(!q) return true;
  return material.name.toLowerCase().includes(q)
    || material.description.toLowerCase().includes(q)
    || material.climateImpact.toLowerCase().includes(q)
    || material.tags.some(t => t.toLowerCase().includes(q));
}
function categoryContainsSearch(cat, query){
  const label = cat.name;
  return materials.some(m => m.tags.includes(label) && matchesSearch(m, query));
}
function shortLine(text){
  return text.length > 78 ? text.slice(0, 78).trim() + '…' : text;
}
function bubbleOverlap(candidate, arr){
  return arr.some(p => {
    const dx = candidate.cx - p.cx;
    const dy = candidate.cy - p.cy;
    return Math.sqrt(dx*dx + dy*dy) < candidate.buffer + p.buffer;
  });
}
function startBubbles(items){
  bubbleItems = items;
  cancelAnimationFrame(rafId);
  lastTime = performance.now();
  const tick = (now) => {
    const dt = Math.min((now - lastTime) / 16.67, 1.3);
    lastTime = now;
    const wrap = document.querySelector('.homeCanvas');
    if(!wrap){ rafId = requestAnimationFrame(tick); return; }
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;

    for(const item of bubbleItems){
      item.x += item.vx * dt;
      item.y += item.vy * dt;
      const minX = 10;
      const minY = 10;
      const maxX = w - item.size - 10;
      const maxY = h - item.size - 10;
      if(item.x <= minX){ item.x = minX; item.vx = Math.abs(item.vx); }
      if(item.x >= maxX){ item.x = maxX; item.vx = -Math.abs(item.vx); }
      if(item.y <= minY){ item.y = minY; item.vy = Math.abs(item.vy); }
      if(item.y >= maxY){ item.y = maxY; item.vy = -Math.abs(item.vy); }
    }

    for(let i=0;i<bubbleItems.length;i++){
      for(let j=i+1;j<bubbleItems.length;j++){
        const a = bubbleItems[i], b = bubbleItems[j];
        const ax = a.x + a.size/2, ay = a.y + a.size/2;
        const bx = b.x + b.size/2, by = b.y + b.size/2;
        const dx = bx - ax, dy = by - ay;
        const d = Math.sqrt(dx*dx + dy*dy) || .001;
        const minDist = (a.size + b.size) * .53;
        if(d < minDist){
          const overlap = (minDist - d)/2;
          const nx = dx/d, ny = dy/d;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;
          const avx=a.vx, avy=a.vy; a.vx=b.vx; a.vy=b.vy; b.vx=avx; b.vy=avy;
        }
      }
    }

    for(const item of bubbleItems){
      item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0) scale(${item.scale})`;
    }
    rafId = requestAnimationFrame(tick);
  };
  rafId = requestAnimationFrame(tick);
}
function stopBubbles(){ if(rafId) cancelAnimationFrame(rafId); rafId = null; bubbleItems = []; }
function buildBubbleElements(list, wrap){
  const placed = [];
  const items = [];
  const w = wrap.clientWidth || window.innerWidth;
  const h = wrap.clientHeight || 620;
  const mobile = window.innerWidth < 800;
  list.forEach(cat => {
    const size = mobile ? 150 : 220;
    const buffer = size * .58;
    let x = 0, y = 0, ok = false, tries = 0;
    while(!ok && tries < 500){
      x = Math.random() * Math.max(1, w - size - 20) + 10;
      y = Math.random() * Math.max(1, h - size - 20) + 10;
      ok = !bubbleOverlap({cx:x+size/2, cy:y+size/2, buffer}, placed);
      tries++;
    }
    placed.push({cx:x+size/2, cy:y+size/2, buffer});
    const el = document.createElement('button');
    el.className = 'categoryBubble';
    el.style.setProperty('--bubble', cat.color);
    el.innerHTML = `<div><div class="categoryTitle">${cat.name}</div><div class="categorySubtitle">${cat.subtitle}</div></div>`;
    el.addEventListener('click', () => openCategory(cat));
    el.addEventListener('mouseenter', () => {
      const found = items.find(i => i.el === el);
      if(found) found.scale = 1.05;
    });
    el.addEventListener('mouseleave', () => {
      const found = items.find(i => i.el === el);
      if(found) found.scale = 1;
    });
    wrap.appendChild(el);
    items.push({ el, size, x, y, vx:(Math.random()*.04)+.01, vy:(Math.random()*.03)+.008, scale:1 });
    if(Math.random() > .5) items[items.length-1].vx *= -1;
    if(Math.random() > .5) items[items.length-1].vy *= -1;
  });
  return items;
}

function renderHome(){
  fadeRender(layer => {
    const visibleCategories = categories.filter(cat => categoryContainsSearch(cat, homeSearch));
    layer.innerHTML = `
      <div class="header">
        <h1>Eco-Friendly Material Library</h1>
        <p>Choose a category to explore • This is a prototype</p>
      </div>
      <div class="searchWrap">
        <input class="searchBar" placeholder="Search materials, descriptions, or tags" value="${homeSearch.replace(/"/g,'&quot;')}" />
      </div>
      <div class="searchResults"></div>
      <div class="homeCanvas"></div>
      <div class="bottomCta"><button class="creatorLink">Meet the Creator!</button></div>
    `;
    layer.querySelector('.creatorLink').addEventListener('click', goCreator);
    const input = layer.querySelector('.searchBar');
    const results = layer.querySelector('.searchResults');
    const canvas = layer.querySelector('.homeCanvas');

    const paintSearchResults = () => {
      const q = homeSearch.trim();
      if(!q){ results.innerHTML = ''; return; }
      const found = materials.filter(m => matchesSearch(m, q)).slice(0, 8);
      if(!found.length){
        results.innerHTML = `<div class="searchResultCard">No materials found for “${q}”.</div>`;
        return;
      }
      results.innerHTML = found.map(m => `
        <div class="searchResultCard" data-slug="${m.slug}">
          <div class="searchResultTop"><div class="searchResultName">${m.name}</div><button class="ghostBtn">Open</button></div>
          <div class="searchResultDesc">${shortLine(m.short || m.description)}</div>
          <div class="tagRow">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      `).join('');
      results.querySelectorAll('.searchResultCard').forEach(card => {
        card.addEventListener('click', () => {
          const mat = materials.find(m => m.slug === card.dataset.slug);
          if(mat) openMaterial(mat);
        });
      });
    };

    const paintBubbles = () => {
      stopBubbles();
      canvas.innerHTML = '';
      const filtered = categories.filter(cat => categoryContainsSearch(cat, homeSearch));
      if(!filtered.length){
        canvas.innerHTML = '<div class="emptyState" style="margin-top:30px">No categories match the current search.</div>';
        return;
      }
      const items = buildBubbleElements(filtered, canvas);
      startBubbles(items);
    };

    input.addEventListener('input', (e) => {
      homeSearch = e.target.value;
      paintSearchResults();
      paintBubbles();
    });

    paintSearchResults();
    requestAnimationFrame(() => paintBubbles());
  });
}

function materialMatchesCategory(material, categoryName){
  return material.tags.includes(categoryName);
}
function materialMatchesFilter(material, filter){
  return filter === 'All' ? true : material.tags.includes(filter);
}
function renderCategory(cat){
  fadeRender(layer => {
    const base = materials.filter(m => materialMatchesCategory(m, cat.name));
    const filtered = base.filter(m => materialMatchesFilter(m, activeCategoryFilter));
    layer.innerHTML = `
      <div class="pageShell">
        <div class="topbar"><button class="backLink">Back to Library</button><button class="creatorLink">Meet the Creator!</button></div>
        <div class="gridHeader">
          <h2>${cat.name}</h2>
          <p>${cat.subtitle}</p>
        </div>
        <div class="filterBar">
          <button class="filterChip ${activeCategoryFilter === 'All' ? 'active' : ''}" data-filter="All">All</button>
          ${tagFilters.map(t => `<button class="filterChip ${activeCategoryFilter === t ? 'active' : ''}" data-filter="${t}">${t}</button>`).join('')}
        </div>
        <div class="materialGrid"></div>
      </div>
    `;
    layer.querySelector('.backLink').addEventListener('click', goHome);
    layer.querySelector('.creatorLink').addEventListener('click', goCreator);
    const grid = layer.querySelector('.materialGrid');
    const paintGrid = () => {
      const now = base.filter(m => materialMatchesFilter(m, activeCategoryFilter));
      if(!now.length){
        grid.innerHTML = `<div class="emptyState" style="grid-column:1/-1">No materials match this filter in ${cat.name}.</div>`;
        return;
      }
      grid.innerHTML = now.map(m => `
        <article class="card" data-slug="${m.slug}">
          <div class="cardTitle">${m.name}</div>
          <div class="cardDesc">${shortLine(m.short || m.description)}</div>
          <div class="tagRow">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </article>
      `).join('');
      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const mat = materials.find(m => m.slug === card.dataset.slug);
          if(mat) openMaterial(mat);
        });
      });
    };
    layer.querySelectorAll('.filterChip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategoryFilter = btn.dataset.filter;
        layer.querySelectorAll('.filterChip').forEach(b => b.classList.toggle('active', b.dataset.filter === activeCategoryFilter));
        paintGrid();
      });
    });
    paintGrid();
  });
}

function renderMaterial(mat){
  fadeRender(layer => {
    layer.innerHTML = `
      <div class="detail">
        <div class="topbar"><button class="backLink">Back</button><button class="creatorLink">Meet the Creator!</button></div>
        <div class="detailInner">
          <div class="detailTop">
            <div class="detailImageWrap"><img src="${mat.image}" alt="${mat.name}" onerror="this.style.display='none'"></div>
            <div>
              <div class="detailTitle">${mat.name}</div>
              <div class="tagRow">${mat.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
              <div class="detailText">${mat.description}</div>
              <div class="impactBox">
                <h3>Climate Impact</h3>
                <p>${mat.climateImpact}</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    layer.querySelector('.backLink').addEventListener('click', () => history.back());
    layer.querySelector('.creatorLink').addEventListener('click', goCreator);
  });
}

function render(){
  const path = window.location.pathname;
  if(path === '/creator') return renderCreator();
  const cat = findCategoryByPath(path);
  if(cat) return renderCategory(cat);
  const mat = findMaterialByPath(path);
  if(mat) return renderMaterial(mat);
  return renderHome();
}
window.addEventListener('popstate', render);
window.addEventListener('resize', () => {
  if(window.location.pathname === '/') renderHome();
});
window.goHome = goHome;
render();
</script>
