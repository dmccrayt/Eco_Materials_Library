<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco-Friendly Material Library</title>

<style>
:root{
  --bg:#e8f6ec;
  --text:#111111;
  --muted:#5f5f5f;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  overflow:hidden;
}

body{
  animation:fadeIn 1.6s ease;
}

#app{
  width:100%;
  height:100%;
  position:relative;
}

.fade-layer{
  width:100%;
  height:100%;
  animation:pageFade 1.6s ease;
}

.header{
  position:absolute;
  top:22px;
  width:100%;
  text-align:center;
  font-size:22px;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-weight:500;
  z-index:10;
}

.subhead{
  position:absolute;
  top:72px;
  width:100%;
  text-align:center;
  font-size:13px;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:var(--muted);
  line-height:1.8;
}

.home{
  width:100%;
  height:100%;
  position:relative;
}

.material{
  position:absolute;
  border:0;
  background:transparent;
  cursor:pointer;
  padding:0;
  transition:filter .5s ease;
  z-index:2;
  transform:translate3d(0,0,0) scale(1);
}

.material:hover{
  filter:drop-shadow(0 20px 35px rgba(0,0,0,.15));
  z-index:5;
}

.material img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
}

.label{
  position:absolute;
  left:50%;
  bottom:-32px;
  transform:translateX(-50%);
  opacity:0;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  transition:.2s;
}

.material:hover .label{
  opacity:1;
}

.creatorHome{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  font-size:15px;
  cursor:pointer;
  text-decoration:underline;
}

.page{
  width:100%;
  min-height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:48px 40px;
  overflow:auto;
  color:var(--text);
}

.page img{
  width:180px;
  margin-bottom:20px;
}

.title{
  font-size:28px;
  margin-bottom:12px;
}

.description{
  max-width:650px;
  font-size:18px;
  line-height:1.6;
}

.impact{
  margin-top:20px;
  font-size:16px;
  max-width:700px;
  line-height:1.6;
}

.creator img{
  width:200px;
  border-radius:8px;
  margin-bottom:20px;
}

.creatorMeta{
  margin-top:22px;
  font-size:16px;
  line-height:1.9;
}

.creatorLink{
  margin-top:40px;
  font-size:15px;
  cursor:pointer;
  text-decoration:underline;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes pageFade{
  from{opacity:0; transform:translateY(6px)}
  to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>
<div id="app"></div>

<script>

const materials = [
{
name:"Cork",
image:"./cork.png",
slug:"cork",
description:"Cork is harvested from cork oak trees without cutting the tree down.",
impact:"Cork has dramatically lower embodied carbon than vinyl flooring."
},
{
name:"Cob",
image:"./cob.png",
slug:"cob",
description:"Cob is a natural building material made from earth, sand, straw and water.",
impact:"Cob has almost zero industrial processing compared to concrete."
},
{
name:"Timber",
image:"./timber.png",
slug:"timber",
description:"Timber stores carbon absorbed during tree growth.",
impact:"Timber structures reduce carbon compared to steel framing."
},
{
name:"Kraft Paper",
image:"./kraft-paper.png",
slug:"kraft",
description:"Kraft paper is recyclable, biodegradable and widely used for packaging.",
impact:"Kraft paper decomposes naturally unlike plastic packaging."
},
{
name:"Bamboo",
image:"./bamboo.png",
slug:"bamboo",
description:"Bamboo is one of the fastest growing plants on Earth.",
impact:"Bamboo regrows faster than hardwood trees."
}
];

const app=document.getElementById("app");
let floatItems=[];
let animationFrame;

function random(min,max){
return Math.random()*(max-min)+min;
}

function overlaps(c,p){
for(const x of p){
const dx=c.cx-x.cx;
const dy=c.cy-x.cy;
const d=Math.sqrt(dx*dx+dy*dy);
if(d<c.buffer+x.buffer)return true;
}
return false;
}

function goHome(){
history.pushState({},"","/");
render();
}

function openCreator(){
history.pushState({},"","/creator");
render();
}

function openMaterial(m){
history.pushState({},"","/"+m.slug);
render();
}

function cancelFloating(){
if(animationFrame)cancelAnimationFrame(animationFrame);
floatItems=[];
}

function setupFloating(items){
floatItems=items;

function tick(){
const vw=window.innerWidth;
const vh=window.innerHeight;

for(const i of floatItems){

i.x+=i.vx;
i.y+=i.vy;

if(i.x<0||i.x>vw-i.size)i.vx*=-1;
if(i.y<120||i.y>vh-i.size-80)i.vy*=-1;

i.el.style.transform=`translate3d(${i.x}px,${i.y}px,0) scale(${i.scale})`;
}

animationFrame=requestAnimationFrame(tick);
}

tick();
}

function fadeRender(cb){
cancelFloating();
app.innerHTML="<div class='fade-layer'></div>";
cb(app.firstChild);
}

function renderHome(){

fadeRender(layer=>{

const header=document.createElement("div");
header.className="header";
header.textContent="Eco-Friendly Material Library";

const sub=document.createElement("div");
sub.className="subhead";
sub.innerHTML="Click a material to explore<br>This is a prototype";

const home=document.createElement("div");
home.className="home";

const creator=document.createElement("div");
creator.className="creatorHome";
creator.textContent="Meet the Creator!";
creator.onclick=openCreator;

const placed=[];
const items=[];

materials.forEach(m=>{

const size=random(180,230);
let x=0,y=0,tries=0;

while(tries<300){
x=random(40,window.innerWidth-size-40);
y=random(140,window.innerHeight-size-100);

const c={cx:x+size/2,cy:y+size/2,buffer:size*.7};

if(!overlaps(c,placed)){
placed.push(c);
break;
}

tries++;
}

const btn=document.createElement("button");
btn.className="material";
btn.style.width=size+"px";
btn.style.height=size+"px";

const img=document.createElement("img");
img.src=m.image;

const label=document.createElement("div");
label.className="label";
label.textContent=m.name;

btn.appendChild(img);
btn.appendChild(label);

btn.onclick=()=>openMaterial(m);

home.appendChild(btn);

items.push({
el:btn,
x,
y,
size,
vx:random(-.2,.2),
vy:random(-.2,.2),
scale:1
});

btn.onmouseenter=()=>items.find(i=>i.el===btn).scale=1.25;
btn.onmouseleave=()=>items.find(i=>i.el===btn).scale=1;

});

layer.appendChild(header);
layer.appendChild(sub);
layer.appendChild(home);
layer.appendChild(creator);

setupFloating(items);

});
}

function renderMaterial(m){
fadeRender(layer=>{
layer.innerHTML=`
<div class="page">
<img src="${m.image}">
<div class="title">${m.name}</div>
<div class="description">${m.description}</div>
<div class="impact"><strong>Climate Impact:</strong> ${m.impact}</div>
<div class="creatorLink" onclick="goHome()">Back to Library</div>
</div>
`;
});
}

function renderCreator(){
fadeRender(layer=>{
layer.innerHTML=`
<div class="page creator">
<img src="./Dillon.jpg">
<p>
Hey! I'm Dillon, a theatre design student exploring sustainable architecture and lighting.
</p>
<div class="creatorMeta">
<div><a href="https://www.linkedin.com/in/dillonmthomas/" target="_blank">LinkedIn</a></div>
<div><a href="https://www.instagram.com/bydillonthomas/" target="_blank">@bydillonthomas</a></div>
</div>
<div class="creatorLink" onclick="goHome()">Back to Library</div>
</div>
`;
});
}

function render(){

const path=location.pathname;

if(path==="/creator"){
renderCreator();
return;
}

const mat=materials.find(m=>"/"+m.slug===path);

if(mat)renderMaterial(mat);
else renderHome();

}

window.onpopstate=render;
render();

</script>
</body>
</html>
