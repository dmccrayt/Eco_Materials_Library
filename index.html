<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eco-Friendly Material Library</title>

<style>
:root{
  --bg:#e8f6ec;
  --text:#111111;
  --muted:#5f5f5f;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  overflow:hidden;
}

body{
  animation:fadeIn 1.6s ease;
}

#app{
  width:100%;
  height:100%;
  position:relative;
}

.fade-layer{
  width:100%;
  height:100%;
  animation:pageFade 1.6s ease;
}

.header{
  position:absolute;
  top:22px;
  width:100%;
  text-align:center;
  font-size:22px;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-weight:500;
  z-index:10;
}

.subhead{
  position:absolute;
  top:72px;
  width:100%;
  text-align:center;
  font-size:13px;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:var(--muted);
  z-index:10;
  line-height:1.8;
}

.home{
  width:100%;
  height:100%;
  position:relative;
}

.material{
  position:absolute;
  left:0;
  top:0;
  border:0;
  background:transparent;
  cursor:pointer;
  padding:0;
  transition:filter .5s ease, opacity .5s ease;
  z-index:2;
  will-change:transform;
  transform:translate3d(0,0,0) scale(1);
}

.material:hover{
  filter:drop-shadow(0 20px 35px rgba(0,0,0,.15)) drop-shadow(0 0 12px rgba(0,0,0,.08));
  z-index:5;
}

.material img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}

.label{
  position:absolute;
  left:50%;
  bottom:-32px;
  transform:translateX(-50%) translateY(6px);
  opacity:0;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  transition:all .2s ease;
  white-space:nowrap;
}

.material:hover .label{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.creatorHome{
  position:absolute;
  bottom:28px;
  width:100%;
  text-align:center;
  font-size:15px;
  cursor:pointer;
  text-decoration:underline;
  z-index:10;
}

.page{
  width:100%;
  min-height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:48px 40px;
  overflow:auto;
  color:var(--text);
}

.page img{
  width:180px;
  margin-bottom:20px;
}

.title{
  font-size:28px;
  margin-bottom:12px;
}

.description{
  max-width:650px;
  font-size:18px;
  line-height:1.6;
  color:var(--text);
}

.description a,
.impact a,
.page a,
.title a{
  color:var(--text);
  text-decoration:none;
}

.impact{
  margin-top:20px;
  font-size:16px;
  color:#333;
  max-width:700px;
  line-height:1.6;
}

.creator img{
  width:200px;
  border-radius:8px;
  margin-bottom:20px;
}

.creator p{
  max-width:700px;
  font-size:18px;
  line-height:1.6;
}

.creatorMeta{
  margin-top:22px;
  font-size:16px;
  line-height:1.9;
}

.creatorMeta div{margin:2px 0}

.creatorMeta a,
.creatorLink{
  color:var(--text);
}

.creatorLink{
  margin-top:40px;
  font-size:15px;
  cursor:pointer;
  text-decoration:underline;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes pageFade{
  from{opacity:0; transform:translateY(6px)}
  to{opacity:1; transform:translateY(0)}
}

@media (max-width: 768px){
  .header{
    font-size:18px;
    letter-spacing:.14em;
    top:18px;
    padding:0 14px;
  }

  .subhead{
    top:72px;
    font-size:11px;
    padding:0 18px;
    line-height:1.7;
  }

  .creatorHome{
    bottom:18px;
    font-size:14px;
  }

  .page{
    padding:36px 22px;
  }

  .page img{
    width:150px;
  }

  .title{
    font-size:24px;
  }

  .description,
  .creator p{
    font-size:17px;
  }

  .impact,
  .creatorMeta{
    font-size:15px;
  }
}
</style>
</head>

<body>
<div id="app"></div>

<script>
const materials = [
  {
    name: "Cork",
    image: "./cork.png",
    slug: "cork",
    description: "Cork is harvested from the bark of cork oak trees without cutting the tree down. Because the bark regenerates, the same tree can be harvested many times over its lifetime. Cork is lightweight, naturally insulating, and widely used in flooring and acoustic materials.",
    impact: "Compared to vinyl flooring, cork has dramatically lower embodied carbon and is renewable because the tree continues growing after harvest."
  },
  {
    name: "Cob",
    image: "./cob.png",
    slug: "cob",
    description: "Cob is a traditional building material made from earth, sand, straw, and water. It can be sculpted into walls by hand and has been used for centuries around the world.",
    impact: "Compared to concrete, cob has almost zero industrial processing and therefore far lower carbon emissions."
  },
  {
    name: "Timber",
    image: "./timber.png",
    slug: "timber",
    description: "Timber stores carbon absorbed during a tree's growth. Modern mass-timber systems allow wood to replace more carbon-intensive materials in structural buildings.",
    impact: "Compared to steel framing, sustainably sourced timber can significantly reduce embodied carbon in buildings."
  },
  {
    name: "Kraft Paper",
    image: "./kraft-paper.png",
    slug: "kraft",
    description: "Kraft paper is a strong paper product made from wood pulp. It is recyclable, biodegradable, and widely used for packaging and protective wrapping.",
    impact: "Compared to plastic packaging, kraft paper decomposes naturally and can be recycled many times."
  },
  {
    name: "Bamboo",
    image: "./bamboo.png",
    slug: "bamboo",
    description: "Bamboo is one of the fastest growing plants on Earth and can be harvested every few years. It is increasingly used in flooring, furniture, and structural systems.",
    impact: "Compared to traditional hardwoods, bamboo regrows much faster and can be harvested far more frequently with less ecological impact."
  }
];

const app = document.getElementById("app");
let floatItems = [];
let animationFrame = null;
let lastTime = 0;

function random(min, max) {
  return Math.random() * (max - min) + min;
}

function pathForMaterial(mat) {
  return "/" + mat.slug;
}

function fadeRender(callback) {
  cancelFloating();
  app.innerHTML = "<div class='fade-layer'></div>";
  const layer = app.querySelector('.fade-layer');
  callback(layer);
}

function goHome() {
  history.pushState({}, "", "/");
  render();
}

function openCreator() {
  history.pushState({}, "", "/creator");
  render();
}

function openMaterial(mat) {
  history.pushState({}, "", pathForMaterial(mat));
  render();
}

/* rest of your JS remains exactly the same */
</script>
</body>
</html>
