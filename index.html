<style>
:root{
  --bg:#f5f5f7;
  --surface:#ffffff;
  --text:#1d1d1f;
  --muted:#6e6e73;
  --line:#e5e5e7;

  --pastel-blue:#eef3ff;
  --pastel-green:#eef8f1;
  --pastel-peach:#fff4ec;
  --pastel-lavender:#f5efff;
  --pastel-yellow:#fff9eb;
  --pastel-pink:#fff1f6;
  --pastel-mint:#ecfaf1;

}

}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;

body{animation:fadeIn .35s ease}
a{color:inherit}
button,input,textarea{font:inherit}
#app{min-height:100vh}
.fade-layer{

}

.siteNav{
  position:sticky;
  top:0;
  z-index:100;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:16px;
  padding:14px 22px 10px;
  backdrop-filter:blur(24px);
  background:rgba(245,245,247,.78);
  border-bottom:1px solid rgba(29,29,31,.05);
}
.brandBtn{
  border:0;
  background:none;
  padding:0 8px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  letter-spacing:.01em;
  justify-self:center;
  color:var(--text);
}
.navSlotLeft{justify-self:start}
.navSlotRight{justify-self:end}
.navPill{
  border:1px solid rgba(29,29,31,.05);
  background:rgba(238,243,255,.82);

  padding:10px 16px;

}

}
.navPill.active{background:#dde8ff;border-color:rgba(29,29,31,.08)}
.navText{font-size:14px;font-weight:600;letter-spacing:.01em}
.navSub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.01em}

.pagePad{   padding:0 24px 42px; }  @media (max-width: 800px){   .pagePad{     padding:0 16px 32px;   } }
.header{padding:24px 0 0;text-align:center}
.header h1{margin:0;font-size:24px;font-weight:600;letter-spacing:.01em}
.header p{margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.7}

.searchWrap{width:min(760px, calc(100vw - 40px));margin:26px auto 0}
.searchShell{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:12px;
  padding:10px;
  border:1px solid rgba(29,29,31,.07);

  background:rgba(255,255,255,.68);

}

}
.searchBar{
  width:100%;

  border-radius:18px;

  padding:0 10px 0 14px;

}
.searchShell:focus-within{border-color:rgba(29,29,31,.12);box-shadow:0 16px 34px rgba(0,0,0,.05)}

.searchResultCard,.homeGalleryCard,.card,.detailImageWrap,.profilePanel,.favoritesShell,.profileShell{

}
.searchResultCard{border-radius:18px;padding:14px 16px}
.searchResultTop{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}

.tagRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tag{

.homeCanvas{

}
.categoryBubble{

  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  cursor:pointer;
  transition:transform .22s ease, box-shadow .22s ease, filter .22s ease;
  will-change:transform;
}
.categoryBubble:hover{box-shadow:0 18px 36px rgba(0,0,0,.09);filter:brightness(1.01)}
.categoryTitle{font-size:18px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.categorySubtitle{margin-top:8px;font-size:13px;line-height:1.5;color:#555}
.categoryBubble.compact .categoryTitle{font-size:16px}
.categoryBubble.compact .categorySubtitle{font-size:12px}

.bottomCta{text-align:center;padding:10px 20px 12px}
.homeCreatorLink{

.homeNavArrows{position:fixed;left:24px;bottom:24px;display:flex;flex-direction:column;gap:12px;z-index:40}

}

.homeGallerySection{width:min(1240px,calc(100vw - 32px));margin:10px auto 40px}
.homeGalleryHeader{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:18px}
.homeGalleryHeader h2,.gridHeader h2,.favoritesTitle{margin:0;font-size:28px;font-weight:600}
.homeGalleryHeader p,.gridHeader p,.favoritesSub{margin:6px 0 0;color:var(--muted)}
.homeGalleryGrid{column-count:4;column-gap:18px}
.homeGalleryCard{break-inside:avoid;margin-bottom:18px;border-radius:24px;overflow:hidden;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}

.homeGalleryImageWrap{background:linear-gradient(180deg,#ffffff 0%,#f8f8fa 100%);display:flex;align-items:center;justify-content:center;padding:22px;min-height:180px}
.homeGalleryImageWrap img{width:100%;max-height:200px;object-fit:contain}
.homeGalleryBody{padding:16px 16px 18px;position:relative}
.homeGalleryTitle,.cardTitle{font-size:17px;font-weight:600;line-height:1.35}
.homeGalleryDesc,.cardDesc{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.55}

.card{border-radius:22px;padding:18px;transition:transform .18s ease, box-shadow .18s ease;cursor:pointer;position:relative}
.pageShell,.detail,.creatorPage,.favoritesPage,.profilePage{min-height:100vh;background:var(--bg)}
.pageShell,.favoritesPage,.profilePage{padding:88px 24px 24px}
.gridHeader{margin:18px auto 0;width:min(1120px,100%)}
.filterBar{width:min(1120px,100%);margin:18px auto 0;display:flex;flex-wrap:wrap;gap:10px}
.filterChip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer}
.filterChip.active{background:#111;color:#fff;border-color:#111}
.materialGrid,.favoritesGrid{width:min(1120px,100%);margin:18px auto 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.starBtn{

  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2

.starBtn.active{background:#e9f7ee;border-color:#b9e4c8}

.detail{padding:96px 24px 24px}
.detailInner{width:min(940px,100%);margin:0 auto}
.detailTop{display:grid;grid-template-columns:220px 1fr;gap:28px;align-items:start;margin-top:0}
.detailImageWrap{border-radius:28px;min-height:220px;display:flex;align-items:center;justify-content:center;padding:22px;position:relative}
.detailImageWrap img{max-width:100%;max-height:180px;object-fit:contain}
.detailTitle{font-size:34px;font-weight:650;line-height:1.15}
.detailText{margin-top:18px;line-height:1.8;font-size:17px;color:#202020}
.impactBox{margin-top:22px;background:linear-gradient(180deg,#faf8ff 0%,#f5f7ff 100%);border:1px solid #ecebff;border-radius:24px;padding:20px}
.impactBox h3{margin:0 0 10px;font-size:14px;letter-spacing:.08em;text-transform:uppercase}
.impactBox p{margin:0;line-height:1.7}

.creatorPage{
  min-height:100vh;
  padding:96px 24px 32px;
  background:linear-gradient(180deg,#f7f7f8 0%,#f3f3f5 100%);
}
.creatorInner{width:min(900px,100%);margin:0 auto}
.creatorPanel{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:36px;
  align-items:start;
}
.creatorPhoto{
  width:180px;
  aspect-ratio:1 / 1;
  margin:0 auto;
  border-radius:24px;
  overflow:hidden;
  border:1px solid rgba(29,29,31,.06);
  background:var(--surface);
  box-shadow:0 10px 24px rgba(0,0,0,.05);
}
.creatorPhoto img{width:100%;height:100%;object-fit:cover}
.creatorHeading{margin-top:0;font-size:48px;line-height:.98;font-weight:650;text-align:left;letter-spacing:-.03em}
.creatorBody{margin-top:14px;line-height:1.8;font-size:16px;color:#2a2a2d;text-align:left}
.creatorQuote{margin-top:14px;color:#3c3c43;line-height:1.8;text-align:left;font-size:16px;font-weight:500}
.creatorLinksBlock{margin-top:22px;display:grid;gap:10px;max-width:420px}
.socialCard{
  display:block;
  text-align:left;
  text-decoration:none;
  border:1px solid rgba(29,29,31,.06);
  border-radius:18px;
  padding:14px 16px;
  background:rgba(255,255,255,.72);
  box-shadow:0 4px 14px rgba(17,17,17,.03);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.socialCard:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(17,17,17,.06);border-color:rgba(29,29,31,.08)}
.socialLabel{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.socialTitle{margin-top:4px;font-size:16px;font-weight:600;color:var(--text)}
.socialSub{margin-top:6px;font-size:14px;color:var(--muted)}

.favoritesShell,.profileShell{width:min(1120px,100%);margin:18px auto 0;border-radius:30px;padding:24px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px)}
.profileLayout{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
.profilePanel{border-radius:24px;padding:20px}
.formField{display:grid;gap:8px;margin-top:12px}
.formField label{font-size:13px;color:var(--muted)}
.textInput{
  height:48px;border:1px solid var(--line);border-radius:16px;padding:0 14px;background:#fff;outline:none
}
.textArea{
  min-height:120px;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff;outline:none;resize:vertical
}
.primaryBtn,.dangerBtn,.secondaryBtn{
  border:0;border-radius:16px;padding:12px 16px;cursor:pointer;font-weight:600
}
.primaryBtn{background:#1d1d1f;color:#fff}
.secondaryBtn{background:var(--pastel-blue);color:var(--text)}
.dangerBtn{background:#ffebeb;color:#9b1c1c}
.inlineActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.emptyState{width:min(1120px,100%);margin:20px auto 0;border:1px dashed #ddd;border-radius:22px;padding:24px;text-align:center;color:var(--muted)}

.authOverlay,.feedbackOverlay{
  position:fixed;inset:0;background:rgba(20,20,24,.22);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:120
}
.authModal,.feedbackModal{
  width:min(520px,100%);border:1px solid rgba(29,29,31,.08);border-radius:30px;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);box-shadow:0 24px 60px rgba(0,0,0,.14);padding:24px
}
.authTabs{display:flex;gap:10px;margin-top:16px}
.authTab{flex:1;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px;cursor:pointer}
.authTab.active{background:var(--pastel-blue)}
.authMessage,.feedbackMessage{margin-top:14px;font-size:14px;color:var(--muted);min-height:20px}
.linkBtn{
  border:0;background:none;padding:0;color:var(--muted);cursor:pointer;text-decoration:underline
}
.hidden{display:none !important}

.feedbackFab{
  position:fixed;
  right:24px;
  bottom:96px;
  z-index:95;
  border:0;
  background:var(--pastel-green);
  color:var(--text);
  border-radius:999px;
  padding:14px 18px;
  box-shadow:0 10px 24px rgba(0,0,0,.08);
  cursor:pointer;
  font-weight:600;
  transition:transform .18s ease, box-shadow .18s ease;
}
.feedbackFab:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 30px rgba(0,0,0,.12);
}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media (max-width: 1000px){
  .homeGalleryGrid{column-count:3}

function bubbleOverlap(candidate, arr){
  return arr.some(p => Math.sqrt((candidate.cx - p.cx) ** 2 + (candidate.cy - p.cy) ** 2) < candidate.buffer + p.buffer);
}

function startBubbles(items){
  bubbleItems = items;
  cancelAnimationFrame(rafId);
  lastTime = performance.now();

  const tick = now => {
    const dt = Math.min((now - lastTime) / 16.67, 1.3);
    lastTime = now;
    const wrap = document.querySelector('.homeCanvas');
    if(!wrap){ rafId = requestAnimationFrame(tick); return; }

    const w = wrap.clientWidth;
    const h = wrap.clientHeight;

    for(const item of bubbleItems){
      item.x += item.vx * dt;
      item.y += item.vy * dt;
      item.vx *= 0.998;
item.vy *= 0.998;

      const minX = 10, minY = 10, maxX = w - item.size - 10, maxY = h - item.size - 10;
      if(item.x <= minX){ item.x = minX; item.vx = Math.abs(item.vx); }
      if(item.x >= maxX){ item.x = maxX; item.vx = -Math.abs(item.vx); }
      if(item.y <= minY){ item.y = minY; item.vy = Math.abs(item.vy); }
      if(item.y >= maxY){ item.y = maxY; item.vy = -Math.abs(item.vy); }
    }

    for(let i = 0; i < bubbleItems.length; i++){
      for(let j = i + 1; j < bubbleItems.length; j++){
        const a = bubbleItems[i], b = bubbleItems[j];
        const ax = a.x + a.size / 2, ay = a.y + a.size / 2;
        const bx = b.x + b.size / 2, by = b.y + b.size / 2;
        const dx = bx - ax, dy = by - ay;
        const d = Math.sqrt(dx * dx + dy * dy) || .001;
        const minDist = (a.size + b.size) * .62;
        if(d < minDist){
          const overlap = (minDist - d) / 2, nx = dx / d, ny = dy / d;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;
          const avx = a.vx, avy = a.vy;
          a.vx = b.vx; a.vy = b.vy;
          b.vx = avx; b.vy = avy;
        }
      }
    }

    for(const item of bubbleItems){
      item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0) scale(${item.scale})`;
    }

    rafId = requestAnimationFrame(tick);
  };

  rafId = requestAnimationFrame(tick);
}

function stopBubbles(){
  if(rafId) cancelAnimationFrame(rafId);
  rafId = null;
  bubbleItems = [];
}

function buildBubbleElements(list, wrap){
  const placed = [];
  const items = [];
  const w = wrap.clientWidth || window.innerWidth;
  const h = wrap.clientHeight || 620;
  const mobile = window.innerWidth < 800;
  const centerX = w / 2;
  const centerY = h / 2;
  const ringRadiusX = mobile ? Math.min(215, w * .36) : Math.min(430, w * .37);
  const ringRadiusY = mobile ? Math.min(230, h * .34) : Math.min(295, h * .30);

  list.forEach((cat, index) => {
    const size = mobile ? 150 : 220;
    const buffer = size * .84;
    const angle = (Math.PI * 2 * index) / list.length - Math.PI / 2;

    let x = centerX + Math.cos(angle) * ringRadiusX - size / 2;
    let y = centerY + Math.sin(angle) * ringRadiusY - size / 2;

    x = Math.max(10, Math.min(w - size - 10, x));
    y = Math.max(10, Math.min(h - size - 10, y));

    let tries = 0;
    while(bubbleOverlap({cx:x + size / 2, cy:y + size / 2, buffer}, placed) && tries < 120){
      x = Math.max(10, Math.min(w - size - 10, x + (Math.random() * 56 - 28)));
      y = Math.max(10, Math.min(h - size - 10, y + (Math.random() * 56 - 28)));
      tries++;
    }

    placed.push({cx:x + size / 2, cy:y + size / 2, buffer});

    const el = document.createElement('button');
    el.className = 'categoryBubble' + (cat.compact ? ' compact' : '');
    el.style.setProperty('--bubble', cat.color);
    el.innerHTML = `<div><div class="categoryTitle">${cat.name}</div><div class="categorySubtitle">${cat.subtitle}</div></div>`;
    el.addEventListener('click', () => openCategory(cat));
    el.addEventListener('mouseenter', () => {
      const found = items.find(i => i.el === el);
      if(found) found.scale = 1.05;
    });
    el.addEventListener('mouseleave', () => {
      const found = items.find(i => i.el === el);
      if(found) found.scale = 1;
    });

    wrap.appendChild(el);
    items.push({
      el, size, x, y,
     vx:(Math.random() * .006) + .0015,
    vy:(Math.random() * .005) + .0015,
      scale:1
    });

    if(Math.random() > .5) items[items.length - 1].vx *= -1;
    if(Math.random() > .5) items[items.length - 1].vy *= -1;
  });

  return items;
}

function starButton(mat){
  const active = favorites.has(mat.name) ? 'active' : '';
  return `<button class="starBtn ${active}" type="button" data-favorite="${mat.slug}" aria-label="Favorite ${mat.name}">${favorites.has(mat.name) ? '★' : '☆'}</button>`;
}

function wireStars(root){
  root.querySelectorAll('[data-favorite]').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();

      const mat = MATERIALS.find(m => m.slug === btn.dataset.favorite);
      if(!mat) return;

      if(!user){
        openAuth('login');
        return;
      }

      if(!user.email_confirmed_at){
        authMessage = 'Please confirm your email before saving favorites.';
        openAuth('login');
        return;
      }

      const isActive = favorites.has(mat.name);

      // instant UI update
      btn.classList.toggle('active', !isActive);
      btn.textContent = !isActive ? '★' : '☆';

      if(isActive){
        favorites.delete(mat.name);
      } else {
        favorites.add(mat.name);
      }

      try{
        await toggleFavorite(mat.name);
      } catch(err){
        console.error(err);
      }
    });
  });
}

async function ensureProfile(){
  if(!supabaseClient || !user) return;
  const { data } = await supabaseClient.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
  profile = data || null;
}

async function loadFavorites(){
  favorites = new Set();
  if(!supabaseClient || !user || !user.email_confirmed_at) return;
  const { data } = await supabaseClient.from('favorites').select('material_name').eq('user_id', user.id);
  (data || []).forEach(row => favorites.add(row.material_name));
}

async function initAuth(){
  if(!supabaseClient) return;
  const { data } = await supabaseClient.auth.getSession();
  user = data.session?.user || null;
  if(user){
    await ensureProfile();
    await loadFavorites();
  }

  supabaseClient.auth.onAuthStateChange(async (_event, session) => {
    user = session?.user || null;
    profile = null;
    favorites = new Set();
    if(user){
      await ensureProfile();
      await loadFavorites();
    }
    render();
  });
}

async function submitAuth(){
  if(!supabaseClient){
    authMessage = 'Please add your real Supabase anon key first.';
    render();
    return;
  }

  const email = document.getElementById('authEmail')?.value.trim();
  const password = document.getElementById('authPassword')?.value;
  const fullName = document.getElementById('authName')?.value.trim();

  if(!email || !password || (authMode === 'signup' && !fullName)){
    authMessage = 'Please complete all required fields.';
    render();
    return;
  }

  if(authMode === 'signup'){
const { data, error } = await supabaseClient.auth.signUp({
  email,
  password,
  options: {
    data: { full_name: fullName }
  }
});

if (error) {
  authMessage = error.message;
  render();
  return;
}

authMessage = 'Welcome! Check your email to confirm your account and get started – Dillon';
closeAuth();
return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){
    authMessage = error.message;
    render();
    return;
  }

  if(data.user && !data.user.email_confirmed_at){
    authMessage = 'Please confirm your email before using favorites or profile features.';
    render();
    return;
  }

  closeAuth();
}

async function sendPasswordReset(){
  const email = document.getElementById('authEmail')?.value.trim();
  if(!email){
    authMessage = 'Enter your email first, then click Forgot Password.';
    render();
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin
  });

  authMessage = error ? error.message : 'Password reset email sent. Check your inbox.';
  render();
}

async function signOut(){
  if(!supabaseClient) return;
  await supabaseClient.auth.signOut();
  goHome();
}

async function toggleFavorite(materialName){
  if(!supabaseClient || !user || !user.email_confirmed_at) return;
  if(favorites.has(materialName)){
    await supabaseClient.from('favorites').delete().eq('user_id', user.id).eq('material_name', materialName);
    favorites.delete(materialName);
  } else {
    await supabaseClient.from('favorites').insert({ user_id: user.id, material_name: materialName });
    favorites.add(materialName);
  }
}

async function updateProfileName(){
  const input = document.getElementById('profileName');
  const full_name = input?.value.trim();
  if(!supabaseClient || !user || !full_name) return;
  const { error } = await supabaseClient.from('profiles').upsert({ id: user.id, full_name });
  if(!error){
    profile = { full_name };
    render();
  }
}

async function deleteAccountRequest(){
  if(!user) return;
  const confirmed = window.confirm('Delete your account? This will fully remove your auth account and all related data.');
  if(!confirmed) return;

  const token = (await supabaseClient.auth.getSession()).data.session?.access_token;
  const response = await fetch('/api/delete-account', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    }
  });

  if(!response.ok){
    alert('Account deletion failed. Check your Vercel function setup.');
    return;
  }

  await supabaseClient.auth.signOut();
  goHome();
}

async function submitFeedback(){
  const message = document.getElementById('feedbackInput')?.value.trim();
  if(!message){
    feedbackMessage = 'Please add a message first.';
    render();
    return;
  }

  const { error } = await supabaseClient.from('feedback').insert({ message });

  if(error){
    feedbackMessage = error.message;
    render();
    return;
  }

  feedbackMessage = 'Thanks for helping us improve 🌱';
  render();

  setTimeout(() => {
    feedbackOpen = false;
    feedbackMessage = '';
    render();
  }, 1200);
}

function bindAuthModal(root){
  const overlay = root.querySelector('#authOverlay');
  if(!overlay) return;

  overlay.querySelector('#authClose').addEventListener('click', closeAuth);
  overlay.addEventListener('click', e => { if(e.target === overlay) closeAuth(); });
  overlay.querySelector('#tabLogin').addEventListener('click', () => { authMode = 'login'; authMessage = ''; render(); });
  overlay.querySelector('#tabSignup').addEventListener('click', () => { authMode = 'signup'; authMessage = ''; render(); });
  overlay.querySelector('#authSubmit').addEventListener('click', submitAuth);
  overlay.querySelector('#forgotPasswordBtn')?.addEventListener('click', sendPasswordReset);
}

              <div class="creatorBody">In the dock below, you'll see a prototype material library I made. It's one way I'm documenting what I learn as I continue exploring design, materials, and environmental performance.</div>
              <div class="creatorQuote">I believe creativity should do more than shape experiences. It should help shape a better future.</div>
              <div class="creatorBody">Next fall, I'll be heading to graduate school to pursue a degree in design, with a focus on environmental systems, sustainability, and human-centered space.</div>
              <div class="creatorLinksBlock">
                <a class="socialCard" href="https://www.linkedin.com/in/dillonmthomas/" target="_blank" rel="noopener noreferrer">
                  <div class="socialLabel">LinkedIn</div>
                  <div class="socialTitle">Dillon Thomas</div>
                  <div class="socialSub">View my professional profile</div>
                </a>
                <a class="socialCard" href="https://www.instagram.com/bydillonthomas/" target="_blank" rel="noopener noreferrer">
                  <div class="socialLabel">Instagram</div>
                  <div class="socialTitle">@bydillonthomas</div>
                  <div class="socialSub">Design work and updates</div>
                </a>
                <a class="socialCard" href="mailto:dillonmthomas@outlook.com">
                  <div class="socialLabel">Email</div>
                  <div class="socialTitle">dillonmthomas@outlook.com</div>
                  <div class="socialSub">Get in touch</div>
                </a>
              </div>
            </section>
          </div>
        </div>
      </div>
      ${feedbackFab()}
      ${authModal()}
      ${feedbackModal()}
    `;

    attachNav(layer);
    bindAuthModal(layer);
    attachFeedback(layer);
  });
}

function renderFavorites(){
  fadeRender(layer => {
    const found = MATERIALS.filter(m => favorites.has(m.name));

    layer.innerHTML = `
      ${renderNav('favorites')}
      <div class="favoritesPage">
        <div class="favoritesShell">
          <div class="favoritesTitle">Favorites</div>
          <div class="favoritesSub">Your saved materials, all in one place.</div>
          <div class="favoritesGrid"></div>
        </div>
      </div>
      ${feedbackFab()}
      ${authModal()}
      ${feedbackModal()}
    `;

    attachNav(layer);
    bindAuthModal(layer);
    attachFeedback(layer);

    const grid = layer.querySelector('.favoritesGrid');

    if(!user){
      grid.innerHTML = `<div class="emptyState" style="grid-column:1/-1">Log in to save and view favorites.</div>`;
      return;
    }

    if(!user.email_confirmed_at){
      grid.innerHTML = `<div class="emptyState" style="grid-column:1/-1">Please confirm your email before using favorites.</div>`;
      return;
    }

    if(!found.length){
      grid.innerHTML = `<div class="emptyState" style="grid-column:1/-1">You have not saved any favorites yet.</div>`;
      return;
    }

    grid.innerHTML = found.map(m => `
      <article class="card" data-slug="${m.slug}">
        ${starButton(m)}
        <div class="cardTitle">${m.name}</div>
        <div class="cardDesc">${shortLine(m.short || m.description)}</div>
        <div class="tagRow">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </article>
    `).join('');

    grid.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', e => {
        if(e.target.closest('.starBtn')) return;
        const mat = MATERIALS.find(m => m.slug === card.dataset.slug);
        if(mat) openMaterial(mat);
      });
    });

    wireStars(grid);
  });
}

function renderProfile(){
  fadeRender(layer => {
    layer.innerHTML = `
      ${renderNav('profile')}
      <div class="profilePage">
        <div class="profileShell">
          <div class="favoritesTitle">Profile</div>
          <div class="favoritesSub">Manage your account and personalize your library.</div>
          <div class="profileLayout">
            <div class="profilePanel">
              <div style="font-size:18px;font-weight:600">Your details</div>
              <div class="formField">
                <label>Name</label>
                <input id="profileName" class="textInput" value="${profile?.full_name || ''}" placeholder="Your name">
              </div>
              <div class="inlineActions">
                <button class="primaryBtn" id="saveProfile">Save changes</button>
                ${user ? '<button class="secondaryBtn" id="signOutBtn">Log out</button>' : ''}
              </div>
            </div>
            <div class="profilePanel">
              <div style="font-size:18px;font-weight:600">Account</div>
              <div style="margin-top:14px;color:var(--muted);line-height:1.7">You can update your name anytime. Account deletion runs through a secure server function so your auth user is removed and your related data cascades automatically.</div>
              <div class="inlineActions">
                ${user ? '<button class="dangerBtn" id="deleteAccountBtn">Delete account</button>' : '<button class="secondaryBtn" id="openAuthBtn">Log in</button>'}
              </div>
            </div>
          </div>
        </div>
      </div>
      ${feedbackFab()}
      ${authModal()}
      ${feedbackModal()}
    `;

    attachNav(layer);
    bindAuthModal(layer);
    attachFeedback(layer);

    if(!user){
      layer.querySelector('#openAuthBtn')?.addEventListener('click', () => openAuth('login'));
      return;
    }

    if(!user.email_confirmed_at){
      layer.querySelector('.profileShell').insertAdjacentHTML('beforeend', `<div class="emptyState">Please confirm your email before using profile features.</div>`);
      return;
    }

    layer.querySelector('#saveProfile').addEventListener('click', updateProfileName);
    layer.querySelector('#signOutBtn').addEventListener('click', signOut);
    layer.querySelector('#deleteAccountBtn').addEventListener('click', deleteAccountRequest);
  });
}

function render(){
  const path = window.location.pathname;
  if(path === '/creator') return renderCreator();
  if(path === '/favorites') return renderFavorites();
  if(path === '/profile') return renderProfile();
  const cat = findCategoryByPath(path); if(cat) return renderCategory(cat);
  const mat = findMaterialByPath(path); if(mat) return renderMaterial(mat);
  return renderHome();
}

window.addEventListener('popstate', render);
let resizeTimeout;

window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);

  resizeTimeout = setTimeout(() => {
    if(window.innerWidth > 800 && window.location.pathname === '/'){
      renderHome();
    }
  }, 300);
});

initAuth().then(render);
</script>
</body>
</html>
